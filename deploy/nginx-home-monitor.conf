# Configuración de Nginx para Home Monitor
# Dominio: antediluvian.tplinkdns.com
#
# Copia este archivo a /etc/nginx/sites-available/home-monitor en la Raspberry,
# y sigue las instrucciones de deploy/README_DEPLOY.md para activarlo.

# --- Bloque HTTP: solo existe para que Certbot pueda validar el dominio
#     y para redirigir todo el tráfico normal a HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name antediluvian.tplinkdns.com;

    # Certbot necesita poder responder aquí durante la validación.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Bloque HTTPS: el real, con certificado de Let's Encrypt ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name antediluvian.tplinkdns.com;

    # Estas dos rutas las rellena Certbot automáticamente la primera vez
    # que pidas el certificado (ver deploy/README_DEPLOY.md). No hace falta
    # que las toques a mano.
    ssl_certificate     /etc/letsencrypt/live/antediluvian.tplinkdns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antediluvian.tplinkdns.com/privkey.pem;

    # Usuario y contraseña: se generan con el comando htpasswd,
    # ver deploy/README_DEPLOY.md paso 4.
    auth_basic "Home Monitor";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
