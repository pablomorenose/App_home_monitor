app = "home-monitor-sandra"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8088"

[http_service]
  internal_port = 8088
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[deploy]
  strategy = "immediate"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
