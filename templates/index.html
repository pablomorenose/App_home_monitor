<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HomeM</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0e0f13" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f6f8" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HomeM">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
  /* ─────────── Sistema de diseño cristal iOS-Revolut ─────────── */
  :root{
    --accent:#0a84ff;--accent-light:#5ac8fa;
    --green:#34c759;--red:#ff3b30;--amber:#ff9500;
    --surface:#0e0f13;
    --text:#f5f5f7;--text-dim:#98989d;--text-tertiary:#636366;
    --card-bg:rgba(255,255,255,.06);
    --card-ring:rgba(255,255,255,.10);
    --card-shadow:0 2px 8px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.35);
    --track:rgba(255,255,255,.08);
    --overlay:rgba(0,0,0,.55);
    --sheet:#1c1e26;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,sans-serif;
    --mono:"SF Mono",ui-monospace,"IBM Plex Mono",Consolas,monospace;
  }
  [data-theme="light"]{
    --surface:#f5f6f8;
    --text:#1c1c1e;--text-dim:#6e6e73;--text-tertiary:#aeaeb2;
    --card-bg:rgba(255,255,255,.82);
    --card-ring:rgba(0,0,0,.05);
    --card-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
    --track:rgba(0,0,0,.06);
    --overlay:rgba(0,0,0,.30);
    --sheet:#ffffff;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--surface);
    background-image:
      radial-gradient(circle at 15% -5%,color-mix(in srgb,var(--accent) 16%,transparent),transparent 45%),
      radial-gradient(circle at 90% 0%,color-mix(in srgb,var(--accent-light) 11%,transparent),transparent 40%);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    letter-spacing:-.01em;
    min-height:100dvh;
    padding:max(96px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    transition:background .3s,color .3s;
  }
  .wrap{max-width:520px;margin:0 auto;}

  /* ── Header estilo Revolut: título grande + botones circulares sin color ── */
  header{display:flex;justify-content:space-between;align-items:center;margin:0 auto 28px;gap:10px;}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px;}
  h1{font-size:30px;font-weight:700;margin:0;letter-spacing:-.03em;}
  .header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .clock{font-family:var(--mono);font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums;display:none;}

  /* Botones circulares translúcidos SIN color (estilo finanzas) */
  .icon-btn{
    width:38px;height:38px;border-radius:999px;
    background:var(--card-bg);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--card-ring);
    box-shadow:var(--card-shadow);
    color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;text-decoration:none;
    transition:transform .12s,opacity .12s;
  }
  .icon-btn:active{transform:scale(.88);opacity:.6;}
  .icon-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;}
  .icon-btn.active{color:var(--red);}

  /* ── Summary chips ── */
  .summary-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .chip{
    padding:6px 13px;border-radius:999px;
    background:var(--card-bg);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--card-ring);
    box-shadow:var(--card-shadow);
    color:var(--text-dim);font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip.alert{
    color:var(--red);
    background:color-mix(in srgb,var(--red) 16%,transparent);
    border-color:color-mix(in srgb,var(--red) 30%,transparent);
  }
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .chip.alert .dot{background:var(--red);}

  /* ─────────── Card de dispositivo (glassmorphism) ─────────── */
  .device-list{display:flex;flex-direction:column;gap:12px;}
  .device-row{
    background:var(--card-bg);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--card-ring);
    border-radius:22px;
    box-shadow:var(--card-shadow);
    transition:opacity .2s,transform .2s,border-color .25s;
    user-select:none;-webkit-user-select:none;
  }
  .device-row.is-down{border-color:rgba(255,59,48,.4);}
  .device-row.protection-off{border-color:rgba(255,149,0,.38);}
  .device-row.dragging{opacity:.4;}
  .device-row.drag-over{transform:scale(1.015);border-color:var(--accent);}

  /* ── Fila 1: cabecera (LED + nombre + estado) ── */
  .device-header{
    display:flex;align-items:center;gap:12px;padding:15px 17px;
    cursor:pointer;
  }
  .device-header:active{background:rgba(255,255,255,.03);}
  .led{width:11px;height:11px;border-radius:50%;background:var(--text-tertiary);flex-shrink:0;transition:background .3s;}
  .led.on{background:var(--green);box-shadow:0 0 8px 2px rgba(52,199,89,.55);}
  .led.off{background:var(--red);box-shadow:0 0 8px 2px rgba(255,59,48,.55);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .device-name-row{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
  .device-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.015em;}
  .badge-maint{font-size:10px;font-weight:600;color:var(--amber);
    border:1px solid color-mix(in srgb,var(--amber) 35%,transparent);
    background:color-mix(in srgb,var(--amber) 12%,transparent);
    border-radius:999px;padding:2px 8px;flex-shrink:0;}
  .status-pill{font-size:11px;font-weight:600;flex-shrink:0;padding:2px 9px;border-radius:999px;}
  .status-pill.up{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent);}
  .status-pill.down{color:var(--red);background:color-mix(in srgb,var(--red) 14%,transparent);}
  .collapse-btn{color:var(--text-dim);flex-shrink:0;transition:transform .25s;display:flex;}
  .collapse-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;}
  .device-row.collapsed .collapse-btn{transform:rotate(-90deg);}
  .drag-handle{color:var(--text-dim);cursor:grab;touch-action:none;flex-shrink:0;opacity:.5;display:flex;}
  .drag-handle:active{cursor:grabbing;opacity:1;color:var(--accent);}
  .drag-handle svg{width:16px;height:16px;fill:currentColor;}

  /* ─────────── Fila PROTECCIÓN (AdGuard) — SIEMPRE visible ─────────── */
  .switch-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:13px 17px;
    border-top:1px solid color-mix(in srgb,var(--text) 7%,transparent);
    background:color-mix(in srgb,var(--text) 2%,transparent);
  }
  .switch-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .switch-title{font-size:13px;font-weight:600;color:var(--text);}
  .switch-sub{font-size:11px;color:var(--text-dim);}
  .switch-control{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .switch-status-label{
    font-size:11px;font-weight:700;letter-spacing:.03em;
    padding:3px 9px;border-radius:999px;
  }
  .switch-status-label.on{color:var(--green);background:color-mix(in srgb,var(--green) 15%,transparent);}
  .switch-status-label.off{color:var(--text-dim);background:var(--track);}
  /* Toggle grande estilo iOS */
  .ios-toggle{position:relative;width:51px;height:31px;flex-shrink:0;}
  .ios-toggle input{opacity:0;width:0;height:0;}
  .ios-toggle-track{
    position:absolute;cursor:pointer;inset:0;
    background:color-mix(in srgb,var(--text) 18%,transparent);
    border-radius:999px;transition:background .25s;
    border:1px solid color-mix(in srgb,var(--text) 8%,transparent);
  }
  .ios-toggle-track:before{
    content:'';position:absolute;height:25px;width:25px;left:2px;top:2px;
    background:#fff;border-radius:50%;transition:transform .25s;
    box-shadow:0 2px 5px rgba(0,0,0,.3);
  }
  .ios-toggle input:checked + .ios-toggle-track{background:var(--green);}
  .ios-toggle input:checked + .ios-toggle-track:before{transform:translateX(20px);}

  /* ── Cuerpo expandible ── */
  .device-body{overflow:hidden;max-height:500px;transition:max-height .3s ease,padding .3s;}
  .device-row.collapsed .device-body{max-height:0;}
  .device-body-inner{padding:0 17px;transition:padding .3s;}
  .device-row.collapsed .device-body-inner{padding-top:0;padding-bottom:0;}

  .device-body-content{
    border-top:1px solid color-mix(in srgb,var(--text) 7%,transparent);
    padding:13px 0 8px;
    display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;
  }
  .device-left{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .device-meta{font-family:var(--mono);font-size:10.5px;color:var(--text-dim);}
  .since-row{font-size:12px;color:var(--text-dim);}
  .error-text{color:var(--amber);}
  .device-right{text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--text-dim);flex-shrink:0;}
  .latency{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
  .latency.fast{color:var(--green);}
  .latency.slow{color:var(--amber);}
  .latency.vslow{color:var(--red);}

  /* ── Sensores (sub-chips cristal) ── */
  .ha-sensors{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
  .ha-sensor{
    font-size:11px;font-weight:500;color:var(--text-dim);
    background:var(--track);
    border:1px solid color-mix(in srgb,var(--text) 5%,transparent);
    border-radius:10px;padding:5px 9px;
    display:inline-flex;align-items:center;gap:5px;
  }
  .ha-sensor b{font-weight:700;color:var(--text);}

  /* ── Sparkline ── */
  .sparkline-wrap{margin-top:6px;}
  .sparkline svg{display:block;}

  /* ── Uptime (solo texto, sin barra) ── */
  .uptime-pct{font-family:var(--mono);font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;}

  /* ── Acciones: botones circulares cristal (como los de cabecera) ── */
  .device-actions{display:flex;gap:9px;padding:6px 0 15px;align-items:center;}
  .act-btn{
    width:34px;height:34px;border-radius:999px;
    background:var(--card-bg);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--card-ring);
    box-shadow:var(--card-shadow);
    color:var(--text-dim);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    transition:transform .12s,opacity .12s,color .15s;
  }
  .act-btn:active{transform:scale(.88);opacity:.6;}
  .act-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;}
  .act-btn.maint{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 30%,transparent);}
  .act-btn.maint.active{background:color-mix(in srgb,var(--amber) 16%,transparent);}
  .act-btn.del{color:var(--text-dim);}
  .act-btn.del:active{color:var(--red);}
  .actions-hint{font-size:11px;color:var(--text-dim);margin-left:auto;}

  footer{margin-top:32px;text-align:center;font-size:11px;color:var(--text-dim);font-family:var(--mono);}

  @media(min-width:521px){.clock{display:block;}}

  /* ── Barras sistema (tarjetas Pi / Docker) ── */
  .sys-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .sys-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);width:42px;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;}
  .sys-bar-wrap{flex:1;height:4px;background:var(--track);border-radius:999px;overflow:hidden;}
  .sys-bar{height:100%;border-radius:999px;transition:width .6s;}
  .sys-val{font-family:var(--mono);font-size:10px;font-weight:600;width:46px;text-align:right;flex-shrink:0;}

  /* Contenedores Docker desplegables */
  .docker-containers{margin-top:10px;border-top:1px solid var(--track);padding-top:8px;display:flex;flex-direction:column;gap:4px;}
  .docker-container-item{border-radius:8px;overflow:hidden;background:var(--card-alt,rgba(255,255,255,.03));}
  .docker-container-header{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none;}
  .docker-container-header:hover{background:rgba(255,255,255,.04);}
  .docker-container-name{font-size:12px;font-weight:600;flex:1;font-family:var(--mono);}
  .docker-container-pill{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;text-transform:uppercase;}
  .docker-container-pill.up{background:rgba(34,197,94,.15);color:#22c55e;}
  .docker-container-pill.down{background:rgba(239,68,68,.15);color:#ef4444;}
  .docker-container-arrow{font-size:10px;color:var(--text-dim);transition:transform .2s;}
  .docker-container-arrow.open{transform:rotate(180deg);}
  .docker-container-body{display:none;padding:6px 10px 8px 10px;gap:6px;flex-direction:column;}
  .docker-container-body.open{display:flex;}

  @media(max-width:520px){
    header{gap:8px;}
    h1{font-size:26px;}
    .device-header{gap:10px;padding:14px 15px;}
    .device-name{font-size:15px;}
  }
  @media(prefers-reduced-motion:reduce){.led.off{animation:none;}}
</style>

<style>
  /* ─────────── Modal (bottom sheet cristal) ─────────── */
  .modal-overlay{display:none;position:fixed;inset:0;background:var(--overlay);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    z-index:100;align-items:flex-end;justify-content:center;padding:0;}
  .modal-overlay.open{display:flex;animation:fadeIn .18s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--sheet);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border:1px solid var(--card-ring);
    border-radius:26px 26px 0 0;
    padding:18px 20px calc(20px + env(safe-area-inset-bottom));
    width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;
    box-shadow:0 -10px 50px rgba(0,0,0,.4);
    animation:slideUp .25s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media(min-width:521px){
    .modal-overlay{align-items:center;padding:20px;}
    .modal{border-radius:26px;animation:fadeIn .18s ease;}
  }
  .modal-handle{width:40px;height:5px;border-radius:999px;background:var(--text-tertiary);opacity:.5;margin:0 auto 14px;}
  .modal h2{margin:0 0 18px;font-size:20px;font-weight:700;letter-spacing:-.02em;}
  .fg{margin-bottom:14px;}
  .fg label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);
    margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
  .fg input,.fg select{
    width:100%;background:var(--track);border:1px solid var(--card-ring);
    border-radius:14px;color:var(--text);font-family:var(--sans);
    font-size:16px;padding:12px 14px;outline:none;transition:border-color .2s;
  }
  .fg input:focus,.fg select:focus{border-color:var(--accent);}
  .fg select option{background:var(--sheet);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:14px;
    font-family:var(--sans);font-size:16px;font-weight:600;padding:14px;cursor:pointer;transition:opacity .15s;}
  .btn-save:active{opacity:.8;}
  .btn-cancel2{flex:1;background:var(--track);border:1px solid var(--card-ring);border-radius:14px;
    color:var(--text);font-family:var(--sans);font-size:16px;font-weight:600;padding:14px;cursor:pointer;transition:background .15s;}
  .btn-cancel2:active{background:color-mix(in srgb,var(--text) 8%,transparent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Casa</div>
      <h1>Monitor</h1>
    </div>
    <div class="header-actions">
      <span class="clock" id="clock">--:--:--</span>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Tema" aria-label="Tema">
        <svg id="theme-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="/historial" class="icon-btn" title="Historial" aria-label="Historial">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      </a>
      <button class="icon-btn" id="check-btn" onclick="forceCheck()" title="Comprobar ahora" aria-label="Comprobar">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="icon-btn add" onclick="openModal()" title="Añadir" aria-label="Añadir dispositivo">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" id="notif-btn" onclick="toggleNotifications()" title="Notificaciones" aria-label="Notificaciones">
        <svg id="notif-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
    </div>
  </header>
  <div class="summary-bar" id="summary-bar"><div class="chip"><span class="dot"></span>Cargando…</div></div>
  <div class="summary-bar" id="filter-bar" style="margin-bottom:12px;">
    <button class="chip" data-filter="all" onclick="setFilter('all')" id="filter-all" style="cursor:pointer;border:1px solid var(--accent);color:var(--accent);">Todos</button>
    <button class="chip" data-filter="online" onclick="setFilter('online')" id="filter-online" style="cursor:pointer;">Online</button>
    <button class="chip" data-filter="offline" onclick="setFilter('offline')" id="filter-offline" style="cursor:pointer;">Offline</button>
  </div>
  <!-- Tarjetas de sistema: Raspberry Pi + Docker (estáticas, datos de /api/pi-stats) -->
  <div class="device-list" id="sys-list" style="margin-bottom:12px">
    <!-- Raspberry Pi -->
    <div class="device-row" id="sys-pi-row" draggable="true" data-id="sys-pi">
      <div class="device-header" onclick="toggleSysCard('sys-pi-row')">
        <div class="led on" id="sys-pi-led"></div>
        <div class="device-name-row"><span class="device-name">Raspberry Pi</span></div>
        <span class="status-pill up" id="sys-pi-status">Online</span>
        <span class="collapse-btn" id="sys-pi-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
        <span class="drag-handle"><svg viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg></span>
      </div>
      <div class="device-body"><div class="device-body-inner">
        <div class="device-body-content">
          <div class="device-left" id="pi-metrics"><div class="since-row">Cargando…</div></div>
          <div class="device-right" id="pi-uptime" style="text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--text-dim)"></div>
        </div>
      </div></div>
    </div>

    <!-- Docker / Home Monitor -->
    <div class="device-row" id="sys-docker-row" draggable="true" data-id="sys-docker">
      <div class="device-header" onclick="toggleSysCard('sys-docker-row')">
        <div class="led on" id="sys-docker-led"></div>
        <div class="device-name-row"><span class="device-name">Docker · Portainer</span></div>
        <span class="status-pill up" id="sys-docker-status">Running</span>
        <span class="collapse-btn" id="sys-docker-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>

        <span class="drag-handle"><svg viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg></span>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Añadir dispositivo</h2>
    <div class="fg"><label>Nombre</label><input type="text" id="f-name" placeholder="Ej: Router Casa"></div>
    <div class="fg"><label>ID único</label><input type="text" id="f-id" placeholder="router_casa"></div>
    <div class="fg">
      <label>Tipo</label>
      <select id="f-type" onchange="updateFields()">
        <option value="http">HTTP — URL accesible</option>
        <option value="ping">Ping — IP en red local</option>
        <option value="port">Puerto TCP</option>
        <option value="ha_entity">Entidad Home Assistant</option>
        <option value="ha_switch">Switch Home Assistant (toggle)</option>

    <div id="fields-http"><div class="fg"><label>URL</label><input type="text" id="f-url" placeholder="https://..."></div></div>
    <div id="fields-ping" style="display:none"><div class="fg"><label>Host / IP</label><input type="text" id="f-host-ping" placeholder="192.168.1.1"></div></div>
    <div id="fields-port" style="display:none">
      <div class="fg"><label>Host / IP</label><input type="text" id="f-host-port" placeholder="192.168.1.1"></div>
      <div class="fg"><label>Puerto</label><input type="number" id="f-port" placeholder="22"></div>
    </div>
    <div id="fields-ha" style="display:none"><div class="fg"><label>Entity ID de Home Assistant</label><input type="text" id="f-entity" placeholder="camera.sonoff1"></div></div>
    <div class="fg"><label>Timeout (segundos)</label><input type="number" id="f-timeout" value="8" min="1" max="30"></div>

      <button class="btn-cancel2" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveDevice()">Guardar</button>
    </div>

<script>
const REFRESH_MS=15000,ORDER_KEY='homem_order',COLLAPSED_KEY='homem_collapsed';
let editingId=null;

// Reloj
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-ES');}
setInterval(updateClock,1000);updateClock();

// Tema — icono SVG outline (luna / sol)
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('homem_theme',t);
  const icon=document.getElementById('theme-icon');
  if(icon){
    icon.innerHTML = t==='dark'
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'  // luna
      : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';  // sol
  }
  document.querySelector('meta[name=theme-color]')?.setAttribute('content',t==='dark'?'#0e0f13':'#f5f6f8');
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
applyTheme(localStorage.getItem('homem_theme')||'dark');

// Orden
function loadOrder(){try{return JSON.parse(localStorage.getItem(ORDER_KEY))||[];}catch{return[];}}
function saveOrder(ids){localStorage.setItem(ORDER_KEY,JSON.stringify(ids));}
function applyOrder(devices){
  const o=loadOrder();if(!o.length)return devices;
  return[...devices].sort((a,b)=>{const ia=o.indexOf(a.id),ib=o.indexOf(b.id);if(ia===-1&&ib===-1)return 0;if(ia===-1)return 1;if(ib===-1)return-1;return ia-ib;});
}

// Colapsado — el estado se persiste por dispositivo.
// Para ha_switch (AdGuard) el valor por defecto es PLEGADO (true),
// para el resto es DESPLEGADO (false). toggleCollapsed respeta el estado real del DOM.
function loadCollapsed(){try{return JSON.parse(localStorage.getItem(COLLAPSED_KEY))||{};}catch{return{};}}
function saveCollapsed(m){localStorage.setItem(COLLAPSED_KEY,JSON.stringify(m));}
function toggleCollapsed(id){
  const r=document.querySelector(`.device-row[data-id="${id}"]`);
  if(!r)return;
  const isNowCollapsed=r.classList.toggle('collapsed');   // invierte el estado visual real
  const m=loadCollapsed();
  m[id]=isNowCollapsed;
  saveCollapsed(m);
}

// Latencia
function latencyHtml(ms){
  if(ms==null)return'';
  let cls='fast',lbl=ms+'ms';
  if(ms>2000){cls='vslow';lbl=(ms/1000).toFixed(1)+'s';}
  else if(ms>500){cls='slow';}
  return`<div class="latency ${cls}">${lbl}</div>`;
}

// Sparkline SVG
const sparkCache={};
function sparklineHtml(id){
  const pts=sparkCache[id];
  if(!pts||pts.length<2)return'';
  const W=100,H=28,max=Math.max(...pts,1),min=Math.min(...pts,0);
  const range=max-min||1;
  const avg=pts.reduce((a,b)=>a+b,0)/pts.length;
  const color=avg>2000?'var(--red)':avg>500?'var(--amber)':'var(--green)';
  const coords=pts.map((v,i)=>`${(i/(pts.length-1)*W).toFixed(1)},${(H-(v-min)/range*H).toFixed(1)}`).join(' ');
  return`<div class="sparkline-wrap" title="Latencia (${pts.length} muestras, media ${Math.round(avg)}ms)"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg></div>`;
}

// Summary
function renderSummary(devices){
  const bar=document.getElementById('summary-bar');
  const total=devices.length,down=devices.filter(d=>!d.online).length;
  bar.innerHTML=!down?`<div class="chip"><span class="dot"></span>${total} dispositivos · todo operativo</div>`
    :`<div class="chip alert"><span class="dot"></span>${down} de ${total} caído${down>1?'s':''}</div><div class="chip">${total-down} operativos</div>`;
}

// ───── Iconos SVG reutilizables ─────
const ICONS={
  chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
  grip:'<svg viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>',
  edit:'<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  wrench:'<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>'
};

// Render de tarjetas
function renderDevices(devices){
  const ordered=applyOrder(devices);
  const collapsed=loadCollapsed();
  const list=document.getElementById('device-list');
  list.innerHTML=ordered.map(d=>{
    const lc=d.online?'on':'off';
    // AdGuard con protección desactivada: tono diferenciado (ámbar) aunque esté online
    const protectionOff = (d.type==='ha_switch' && d.switch_state==='off');
    // Estado plegado: ha_switch (AdGuard) PLEGADO por defecto; resto DESPLEGADO.
    // El interruptor de AdGuard vive fuera del cuerpo plegable, así que sigue visible.
    // Si el usuario ya tiene preferencia guardada, se respeta.
    const defaultCollapsed = true;
    const isCollapsed = (typeof collapsed[d.id]==='boolean') ? collapsed[d.id] : defaultCollapsed;
    const rc=(d.online?'':'is-down')+(isCollapsed?' collapsed':'')+(protectionOff?' protection-off':'');
    const sc=d.online?'up':'down';
    const sl=d.online?'Online':'Offline';
    const since=d.online?`${d.since_human} en línea`:`caído hace ${d.since_human}`;
    const maintBadge=d.in_maintenance?`<span class="badge-maint">Mant.</span>`:'';
    const haSensors=d.id==='home_assistant'?`<div id="ha-sensors" class="ha-sensors"></div>`:'';
    const extraSensors=(d.id==='adguard')?`<div id="adguard-sensors" class="ha-sensors"></div>`:'';

    // Fila PROTECCIÓN para ha_switch (dentro del body desplegable)
    const switchRow = (d.type==='ha_switch') ? `
      <div class="switch-row">
        <div class="switch-info">
          <span class="switch-title">Bloqueo de anuncios</span>
          <span class="switch-sub">Protección DNS de AdGuard</span>
        </div>
        <div class="switch-control">
          <span class="switch-status-label ${d.switch_state==='on'?'on':'off'}" id="switch-status-${d.id}">
            ${d.switch_state==='on'?'Activado':(d.switch_state==='off'?'Desactivado':'—')}
          </span>
          <label class="ios-toggle" onclick="event.stopPropagation()">
            <input type="checkbox" id="switch-input-${d.id}" ${d.switch_state==='on'?'checked':''}
              onchange="toggleSwitch('${d.id}', this.checked)">
            <span class="ios-toggle-track"></span>
          </label>
        </div>
      </div>` : '';

    return`<div class="device-row ${rc}" draggable="true" data-id="${d.id}">
      <div class="device-header">
        <div class="led ${lc}"></div>
        <div class="device-name-row">
          <span class="device-name">${d.name}</span>
          ${maintBadge}
        </div>
        <span class="status-pill ${sc}">${sl}</span>
        <span class="collapse-btn">${ICONS.chevron}</span>
        <span class="drag-handle">${ICONS.grip}</span>
      </div>
      <div class="device-body"><div class="device-body-inner">
        ${switchRow}
        <div class="device-body-content">
          <div class="device-left">
            <div class="since-row">${since}</div>
            ${d.last_error?`<div class="error-text">${d.last_error.replace(/camera/gi,'cam\u200Bera').replace(/tracker/gi,'trac\u200Bker').replace(/ads?[\s._-]/gi,m=>'a\u200B'+m.slice(1))}</div>`:''}
            ${haSensors}
            ${extraSensors}
            ${sparklineHtml(d.id)}
          </div>
          <div class="device-right">
            ${latencyHtml(d.response_ms)}
            <div class="uptime-pct" id="uptime-pct-${d.id}">…</div>
          </div>
        </div>
        <div class="device-actions">
          <button class="act-btn edit" title="Editar" aria-label="Editar" onclick="editDevice('${d.id}')">${ICONS.edit}</button>
          <button class="act-btn maint ${d.in_maintenance?'active':''}" title="Mantenimiento" aria-label="Mantenimiento" onclick="toggleMaintenance('${d.id}',${d.in_maintenance})">${ICONS.wrench}</button>
          <button class="act-btn del" title="Borrar" aria-label="Borrar" onclick="confirmDelete('${d.id}','${d.name}')">${ICONS.trash}</button>
        </div>
      </div></div>
    </div>`;
  }).join('');
  initInteractions();
  ordered.forEach(d=>{loadUptime(d.id);loadLatency(d.id);});
  loadHaSensors();
}

async function loadUptime(id){
  try{
    const data=await(await fetch(`/api/uptime/${id}`)).json();
    const pct=data.uptime_pct;
    const col=pct>=99?'var(--green)':pct>=90?'var(--amber)':'var(--red)';
    const el=document.getElementById(`uptime-pct-${id}`);
    if(el){el.textContent='↑ '+pct+'%';el.style.color=col;}
  }catch{}
}

async function loadLatency(id){
  try{
    const data=await(await fetch(`/api/latency/${id}`)).json();
    if(data.points&&data.points.length){
      sparkCache[id]=data.points.map(p=>p.ms);
      const row=document.querySelector(`.device-row[data-id="${id}"] .sparkline-wrap`);
      if(row)row.outerHTML=sparklineHtml(id);
    }
  }catch{}
}
</script>

<script>
// Modal
function updateFields(){
  const t=document.getElementById('f-type').value;
  ['http','ping','port','ha'].forEach(k=>document.getElementById('fields-'+k).style.display=t===(k==='ha'?'ha_entity':k)?'':'none');
  if(t==='ha_switch') document.getElementById('fields-ha').style.display='';
}
function openModal(device){
  editingId=device?device.id:null;
  document.getElementById('modal-title').textContent=device?'Editar dispositivo':'Añadir dispositivo';
  document.getElementById('f-name').value=device?.name||'';
  document.getElementById('f-id').value=device?.id||'';
  document.getElementById('f-id').disabled=!!device;
  document.getElementById('f-type').value=device?.type||'http';
  document.getElementById('f-url').value=device?.url||'';
  document.getElementById('f-host-ping').value=device?.host||'';
  document.getElementById('f-host-port').value=device?.host||'';
  document.getElementById('f-port').value=device?.port||'';
  document.getElementById('f-entity').value=device?.entity_id||'';
  document.getElementById('f-timeout').value=device?.timeout||8;
  updateFields();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOnBg(e){if(e.target.id==='modal-overlay')closeModal();}
async function saveDevice(){
  const type=document.getElementById('f-type').value;
  const name=document.getElementById('f-name').value.trim();
  const id=editingId||document.getElementById('f-id').value.trim().replace(/\s+/g,'_');
  const timeout=parseInt(document.getElementById('f-timeout').value)||8;
  if(!name||!id){alert('Nombre e ID son obligatorios');return;}
  const device={id,name,type,timeout};
  if(type==='http')device.url=document.getElementById('f-url').value.trim();
  if(type==='ping')device.host=document.getElementById('f-host-ping').value.trim();
  if(type==='port'){device.host=document.getElementById('f-host-port').value.trim();device.port=parseInt(document.getElementById('f-port').value);}
  if(type==='ha_entity')device.entity_id=document.getElementById('f-entity').value.trim();
  await fetch(editingId?`/api/devices/${editingId}`:'/api/devices',{method:editingId?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(device)});
  closeModal();refresh();
}
async function editDevice(id){
  const devs=await(await fetch('/api/devices')).json();
  const d=devs.find(x=>x.id===id);if(d)openModal(d);
}
async function confirmDelete(id,name){
  if(!confirm(`¿Borrar "${name}"? Se eliminará también su historial.`))return;
  await fetch(`/api/devices/${id}`,{method:'DELETE'});refresh();
}

// Toggle AdGuard
async function toggleSwitch(id, checked){
  const action = checked ? 'turn_on' : 'turn_off';
  const statusEl = document.getElementById(`switch-status-${id}`);
  const input = document.getElementById(`switch-input-${id}`);
  if(statusEl){ statusEl.textContent='...'; statusEl.className='switch-status-label off'; }
  try {
    const res = await fetch(`/api/toggle/${id}`, {
      method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action})
    });
    const data = await res.json();
    if(!data.ok){
      if(input) input.checked = !checked;
      if(statusEl){ statusEl.textContent='Error'; statusEl.className='switch-status-label off'; }
      alert('Error: ' + data.message);
    } else {
      if(statusEl){
        statusEl.textContent = checked ? 'Activado' : 'Desactivado';
        statusEl.className = 'switch-status-label ' + (checked ? 'on' : 'off');
      }
    }
  } catch {
    if(input) input.checked = !checked;
    if(statusEl){ statusEl.textContent='Error'; statusEl.className='switch-status-label off'; }
  }
}

// Drag & Drop
function initInteractions(){
  const list=document.getElementById('device-list');
  const rows=[...list.querySelectorAll('.device-row')];
  let dragged=null;
  rows.forEach(row=>{
    row.querySelector('.device-header').addEventListener('click',e=>{
      if(!e.target.closest('.drag-handle')&&!e.target.closest('.switch-row')&&!e.target.closest('.ios-toggle'))
        toggleCollapsed(row.dataset.id);
    });
    row.addEventListener('dragstart',e=>{if(!e.target.closest('.drag-handle')&&e.target!==row){e.preventDefault();return;}dragged=row;setTimeout(()=>row.classList.add('dragging'),0);});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));persistOrder();});
    row.addEventListener('dragover',e=>{e.preventDefault();if(row!==dragged){list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');}});
    row.addEventListener('drop',e=>{e.preventDefault();if(row!==dragged){const all=[...list.querySelectorAll('.device-row')];all.indexOf(dragged)<all.indexOf(row)?row.after(dragged):row.before(dragged);}});
  });
  let td=null,tc=null,tOY=0;
  rows.forEach(row=>{
    row.querySelector('.drag-handle').addEventListener('touchstart',e=>{
      td=row;const t=e.touches[0],r=row.getBoundingClientRect();tOY=t.clientY-r.top;
      tc=row.cloneNode(true);Object.assign(tc.style,{position:'fixed',zIndex:1000,width:r.width+'px',left:r.left+'px',top:r.top+'px',opacity:.85,pointerEvents:'none',border:'1px solid var(--accent)',borderRadius:'22px',background:'var(--sheet)',transition:'none'});
      document.body.appendChild(tc);row.classList.add('dragging');e.preventDefault();
    },{passive:false});
  });
  document.addEventListener('touchmove',e=>{
    if(!td||!tc)return;const t=e.touches[0];tc.style.top=(t.clientY-tOY)+'px';
    tc.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);tc.style.display='';
    const tgt=el&&el.closest('.device-row');list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));
    if(tgt&&tgt!==td)tgt.classList.add('drag-over');e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!td)return;const t=e.changedTouches[0];if(tc){tc.remove();tc=null;}td.classList.remove('dragging');
    list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);const tgt=el&&el.closest('.device-row');
    if(tgt&&tgt!==td){const all=[...list.querySelectorAll('.device-row')];all.indexOf(td)<all.indexOf(tgt)?tgt.after(td):tgt.before(td);}
    persistOrder();td=null;
  });
}
function persistOrder(){saveOrder([...document.querySelectorAll('.device-row')].map(r=>r.dataset.id));}

// Fetch
async function loadHaSensors(){
  try{
    const data=await(await fetch('/api/ha-sensors')).json();
    const el=document.getElementById('ha-sensors');
    if(el){
      const cpu=data['sensor.system_monitor_temperatura_del_procesador'];
      const ram=data['sensor.system_monitor_uso_de_memoria_2'];
      el.innerHTML=
        (cpu?`<div class="ha-sensor">CPU <b>${cpu.state}${cpu.unit}</b></div>`:'')
       +(ram?`<div class="ha-sensor">RAM <b>${ram.state}${ram.unit}</b></div>`:'');
    }
    const elAd=document.getElementById('adguard-sensors');
    if(elAd){
      const dns=data['sensor.adguard_home_consultas_dns'];
      const blocked=data['sensor.adguard_home_proporcion_de_consultas_dns_bloqueadas'];
      elAd.innerHTML=
        (dns?`<div class="ha-sensor">Consultas <b>${dns.state}</b></div>`:'')
       +(blocked?`<div class="ha-sensor">Bloqueo <b>${blocked.state}${blocked.unit}</b></div>`:'');
    }
  }catch{}
}

// Filtro Todos/Online/Offline
let currentFilter='all';
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('#filter-bar .chip').forEach(btn=>{
    btn.style.border=btn.dataset.filter===f?'1px solid var(--accent)':'1px solid var(--card-ring)';
    btn.style.color=btn.dataset.filter===f?'var(--accent)':'var(--text-dim)';
  });
  applyFilter();
}
function applyFilter(){
  // Solo filtrar dispositivos monitorizados (NO las tarjetas de sistema)
  document.querySelectorAll('#device-list > .device-row').forEach(row=>{
    const isDown=row.classList.contains('is-down');
    if(currentFilter==='all'){row.style.display='';}
    else if(currentFilter==='online'){row.style.display=isDown?'none':'';}
    else if(currentFilter==='offline'){row.style.display=isDown?'':'none';}
  });
  // Ocultar tarjetas de sistema en filtro offline (no son dispositivos monitorizados)
  const sysList=document.getElementById('sys-list');
  if(sysList) sysList.style.display=(currentFilter==='offline')?'none':'';
}

// Drag & drop para tarjetas sistema
(function(){
  const list=document.getElementById('sys-device-list');
  if(!list)return;
  let dragged=null;
  list.querySelectorAll('.device-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{if(!e.target.closest('.drag-handle')){e.preventDefault();return;}dragged=row;setTimeout(()=>row.classList.add('dragging'),0);});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();if(row!==dragged){list.querySelectorAll('.device-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');}});
    row.addEventListener('drop',e=>{e.preventDefault();if(row!==dragged){const all=[...list.querySelectorAll('.device-row')];all.indexOf(dragged)<all.indexOf(row)?row.after(dragged):row.before(dragged);}});
  });
})();

async function loadPiStats(){
  try{
    const d=await(await fetch('/api/pi-stats')).json();

    // --- Raspberry Pi card ---
    const piEl=document.getElementById('pi-metrics');
    const piUp=document.getElementById('pi-uptime');
    if(piEl){
      const tempColor = d.temp_c==null?'var(--green)':d.temp_c<70?'var(--green)':d.temp_c<80?'var(--amber)':'var(--red)';
      const cpuColor  = d.cpu_pct==null?'var(--green)':d.cpu_pct<70?'var(--green)':d.cpu_pct<90?'var(--amber)':'var(--red)';
      const ramColor  = d.ram_pct==null?'var(--green)':d.ram_pct<70?'var(--green)':d.ram_pct<90?'var(--amber)':'var(--red)';
      const diskColor = d.disk_pct==null?'var(--green)':d.disk_pct<80?'var(--green)':d.disk_pct<95?'var(--amber)':'var(--red)';
      piEl.innerHTML=`
        <div class="sys-row"><span class="sys-label">CPU</span><div class="sys-bar-wrap"><div class="sys-bar" style="width:${d.cpu_pct??0}%;background:${cpuColor}"></div></div><span class="sys-val" style="color:${cpuColor}">${d.cpu_pct!=null?d.cpu_pct+'%':'—'}</span></div>
        <div class="sys-row"><span class="sys-label">RAM</span><div class="sys-bar-wrap"><div class="sys-bar" style="width:${d.ram_pct??0}%;background:${ramColor}"></div></div><span class="sys-val" style="color:${ramColor}">${d.ram_pct!=null?d.ram_pct+'%':'—'}</span></div>
        <div class="sys-row"><span class="sys-label">Temp</span><div class="sys-bar-wrap"><div class="sys-bar" style="width:${d.temp_c!=null?Math.min(d.temp_c,100):0}%;background:${tempColor}"></div></div><span class="sys-val" style="color:${tempColor}">${d.temp_c!=null?d.temp_c+'°C':'—'}</span></div>
        <div class="sys-row"><span class="sys-label">Disco</span><div class="sys-bar-wrap"><div class="sys-bar" style="width:${d.disk_pct??0}%;background:${diskColor}"></div></div><span class="sys-val" style="color:${diskColor}">${d.disk_pct!=null?d.disk_pct+'%':'—'}</span></div>
        <div class="since-row" style="margin-top:6px">${d.ram_used_mb!=null?`RAM ${d.ram_used_mb}/${d.ram_total_mb} MB · `:''}${d.disk_used_gb!=null?`Disco ${d.disk_used_gb}/${d.disk_total_gb} GB`:''}</div>
      `;
    }
    if(piUp && d.uptime) piUp.innerHTML=`<div>Uptime</div><div style="font-weight:600;color:var(--text);margin-top:2px">${d.uptime}</div>`;

    // --- Docker card ---
    const dkEl=document.getElementById('docker-metrics');
    const dkLed=document.getElementById('sys-docker-led');
    const dkStatus=document.getElementById('sys-docker-status');
    const dkRow=document.getElementById('sys-docker-row');
    const dkList=document.getElementById('docker-containers-list');
    if(dkEl && d.docker){
      const dk=d.docker;
      const anyRunning=dk.status==='running';
      if(dkLed){dkLed.className='led '+(anyRunning?'on':'off');}
      if(dkStatus){dkStatus.className='status-pill '+(anyRunning?'up':'down');dkStatus.textContent=anyRunning?`${dk.running}/${dk.total} UP`:'Stopped';}
      if(dkRow){dkRow.classList.toggle('is-down',!anyRunning);}
      dkEl.innerHTML=`
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">Contenedores</span><span class="sys-val" style="color:var(--text);width:auto">${dk.running} activos / ${dk.total} total</span></div>
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">CPU total</span><span class="sys-val" style="color:var(--text);width:auto">${dk.total_cpu||'—'}</span></div>
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">RAM total</span><span class="sys-val" style="color:var(--text);width:auto">${dk.total_mem_mb?dk.total_mem_mb+'MB':'—'}</span></div>
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">Imagenes</span><span class="sys-val" style="color:var(--text-dim);width:auto">${dk.disk_images_mb?dk.disk_images_mb+'MB':'—'}</span></div>
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">Volumenes</span><span class="sys-val" style="color:var(--text-dim);width:auto">${dk.disk_volumes_mb?dk.disk_volumes_mb+'MB':'—'}</span></div>
        <div class="sys-row"><span class="sys-label" style="width:auto;min-width:90px">Docker</span><span class="sys-val" style="color:var(--text-dim);width:auto">v${dk.version||'—'}</span></div>
      `;
      // Lista de contenedores con desplegable
      if(dkList && dk.containers && dk.containers.length){
        const openStates={};
        // Guardar estado open de los que ya existian
        dkList.querySelectorAll('.docker-container-item').forEach(el=>{
          const b=el.querySelector('.docker-container-body');
          if(b && b.classList.contains('open')) openStates[el.dataset.name]=true;
        });
        dkList.innerHTML='<div class="docker-containers">'+dk.containers.map(c=>{
          const up=c.status==='running';
          const isOpen=!!openStates[c.name];
          return `<div class="docker-container-item" data-name="${c.name}">
            <div class="docker-container-header" onclick="toggleDockerContainer(this)">
              <div class="led ${up?'on':'off'}" style="width:8px;height:8px;min-width:8px"></div>
              <span class="docker-container-name">${c.name}</span>
              <span class="docker-container-pill ${up?'up':'down'}">${up?'UP':'DOWN'}</span>
              <span class="docker-container-arrow ${isOpen?'open':''}">▼</span>
            </div>
            <div class="docker-container-body ${isOpen?'open':''}">
              <div class="sys-row"><span class="sys-label" style="width:70px">CPU</span><span class="sys-val" style="width:auto;color:var(--text)">${c.cpu}</span></div>
              <div class="sys-row"><span class="sys-label" style="width:70px">RAM</span><span class="sys-val" style="width:auto;color:var(--text)">${c.mem}</span></div>
              <div class="sys-row"><span class="sys-label" style="width:70px">Red ↓↑</span><span class="sys-val" style="width:auto;color:var(--text-dim)">${c.net_rx} / ${c.net_tx}</span></div>
              <div class="sys-row"><span class="sys-label" style="width:70px">Disco R/W</span><span class="sys-val" style="width:auto;color:var(--text-dim)">${c.blk_read} / ${c.blk_write}</span></div>
              <div class="sys-row"><span class="sys-label" style="width:70px">Imagen</span><span class="sys-val" style="width:auto;color:var(--text-dim)">${c.image_size}</span></div>
              ${c.started_at?`<div class="sys-row"><span class="sys-label" style="width:70px">Inicio</span><span class="sys-val" style="width:auto;color:var(--text-dim)">${c.started_at}</span></div>`:''}
              <div class="sys-row"><span class="sys-label" style="width:70px">Reinicios</span><span class="sys-val" style="width:auto;color:${c.restart_count>0?'var(--yellow,#eab308)':'var(--text-dim)'}">${c.restart_count}</span></div>
            </div>
          </div>`;
        }).join('')+'</div>';
      }
    }
  }catch{}
}

// Plegar/desplegar tarjetas de sistema (Pi/Docker) — estado memorizado
const SYS_COLLAPSED_KEY='homem_sys_collapsed';
function loadSysCollapsed(){try{return JSON.parse(localStorage.getItem(SYS_COLLAPSED_KEY))||{};}catch{return{};}}
function saveSysCollapsed(m){localStorage.setItem(SYS_COLLAPSED_KEY,JSON.stringify(m));}
function applySysCollapsedState(){
  // Por defecto aparecen PLEGADAS; si el usuario las desplegó, se respeta.
  const m=loadSysCollapsed();
  ['sys-pi-row','sys-docker-row','sys-vscanner-row'].forEach(id=>{
    const r=document.getElementById(id);
    if(!r)return;
    const collapsed=(typeof m[id]==='boolean')?m[id]:true;
    r.classList.toggle('collapsed',collapsed);
  });
}
function toggleSysCard(rowId){
  const r=document.getElementById(rowId);
  if(!r)return;
  const isNowCollapsed=r.classList.toggle('collapsed');
  const m=loadSysCollapsed();
  m[rowId]=isNowCollapsed;
  saveSysCollapsed(m);
}

function toggleDockerContainer(header){
  const body=header.nextElementSibling;
  const arrow=header.querySelector('.docker-container-arrow');
  if(!body)return;
  const isOpen=body.classList.toggle('open');
  if(arrow){arrow.classList.toggle('open',isOpen);}
}

// Push
let swReg=null;
async function initPush(){
  const btn=document.getElementById('notif-btn');
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){return;}
  swReg=await navigator.serviceWorker.register('/static/sw.js');
  await navigator.serviceWorker.ready;
  const sub=await swReg.pushManager.getSubscription();
  if(sub){btn.classList.add('active');}
}
async function toggleNotifications(){
  const btn=document.getElementById('notif-btn');
  if(!swReg){alert('El service worker aun no esta listo. Espera un momento y vuelve a intentarlo.');return;}
  const sub=await swReg.pushManager.getSubscription();
  if(sub){
    await sub.unsubscribe();
    await fetch('/api/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:sub.endpoint})});
    btn.classList.remove('active');
    alert('Notificaciones desactivadas.');return;
  }
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){alert('Permiso de notificaciones denegado en el navegador.');return;}
  const{publicKey}=await(await fetch('/api/vapid-key')).json();
  const newSub=await swReg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(publicKey)});
  await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newSub.toJSON())});
  btn.classList.add('active');
  alert('Notificaciones activadas correctamente.');
}
function urlBase64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
initPush();

// ─────────── Video Scanner card ───────────
const VSCANNER_URL='https://raspberrypi.tail08d292.ts.net:10000';

async function loadVscannerStatus(){
  const led=document.getElementById('vscanner-led');
  const status=document.getElementById('vscanner-status');
  const metrics=document.getElementById('vscanner-metrics');
  const badge=document.getElementById('vscanner-new-badge');
  const hint=document.getElementById('vscanner-hint');
  try{
    const r=await fetch(VSCANNER_URL+'/api/status',{signal:AbortSignal.timeout(5000)});
    const data=await r.json();
    if(led)led.className='led on';
    if(status){status.className='status-pill up';status.textContent=data.scan.running?'Escaneando':'Online';}

    const pending=data.downloads.pending+data.downloads.downloading;
    const complete=data.downloads.complete;
    const lastScan=data.lastScan?new Date(data.lastScan).toLocaleString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'Nunca';

    if(metrics)metrics.innerHTML=`
      <div class="sys-row"><span class="sys-label" style="width:auto;min-width:85px">Último escaneo</span><span class="sys-val" style="width:auto;color:var(--text)">${lastScan}</span></div>
      <div class="sys-row"><span class="sys-label" style="width:auto;min-width:85px">URLs conocidas</span><span class="sys-val" style="width:auto;color:var(--text)">${data.totalKnown||0}</span></div>
      <div class="sys-row"><span class="sys-label" style="width:auto;min-width:85px">Descargados</span><span class="sys-val" style="width:auto;color:var(--green)">${complete}</span></div>
      <div class="sys-row"><span class="sys-label" style="width:auto;min-width:85px">Pendientes</span><span class="sys-val" style="width:auto;color:${pending?'var(--amber)':'var(--text-dim)'}">${pending}</span></div>
      ${data.scan.running?`<div class="sys-row"><span class="sys-label" style="width:auto;min-width:85px">Progreso</span><span class="sys-val" style="width:auto;color:var(--accent)">${data.scan.progress}%</span></div>`:''}
    `;
    if(badge){
      if(pending>0){badge.textContent=pending+' pendiente'+(pending>1?'s':'');badge.style.display='';}
      else{badge.style.display='none';}
    }
    if(hint)hint.textContent=data.scan.running?'Escaneando…':'';
  }catch(e){
    if(led)led.className='led off';
    if(status){status.className='status-pill down';status.textContent='Offline';}
    if(metrics)metrics.innerHTML='<div class="since-row" style="color:var(--red)">No se pudo conectar</div>';
    if(badge)badge.style.display='none';
  }
}

async function vscannerScan(){
  const hint=document.getElementById('vscanner-hint');
  try{
    await fetch(VSCANNER_URL+'/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({period:'7d'})});
    if(hint)hint.textContent='Escaneo iniciado';
  }catch{if(hint)hint.textContent='Error';}
}
async function vscannerDownload(){
  const hint=document.getElementById('vscanner-hint');
  try{
    await fetch(VSCANNER_URL+'/api/downloads/start',{method:'POST'});
    if(hint)hint.textContent='Descargas iniciadas';
  }catch{if(hint)hint.textContent='Error';}
}

loadVscannerStatus();
setInterval(loadVscannerStatus,15000);
