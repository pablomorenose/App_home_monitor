<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HomeM — Acceso</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0e0f13" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f6f8" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
  :root{
    --accent:#0a84ff;--green:#34c759;--red:#ff3b30;
    --surface:#0e0f13;
    --text:#f5f5f7;--text-dim:#98989d;
    --card-bg:rgba(255,255,255,.06);
    --card-ring:rgba(255,255,255,.10);
    --card-shadow:0 2px 8px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.35);
    --track:rgba(255,255,255,.08);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,sans-serif;
  }
  [data-theme="light"]{
    --surface:#f5f6f8;
    --text:#1c1c1e;--text-dim:#6e6e73;
    --card-bg:rgba(255,255,255,.82);
    --card-ring:rgba(0,0,0,.05);
    --card-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
    --track:rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;background:var(--surface);
    background-image:
      radial-gradient(circle at 50% 15%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 50%),
      radial-gradient(circle at 50% 85%,color-mix(in srgb,var(--green) 10%,transparent),transparent 45%);
    color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{
    background:var(--card-bg);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border:1px solid var(--card-ring);
    border-radius:28px;
    box-shadow:var(--card-shadow);
    padding:36px 28px calc(36px + env(safe-area-inset-bottom));
    width:100%;max-width:360px;text-align:center;
  }
  .logo{font-size:44px;margin-bottom:10px;}
  h1{font-size:26px;font-weight:700;margin:0 0 4px;letter-spacing:-.025em;}
  .sub{font-size:12px;font-weight:600;color:var(--text-dim);
       text-transform:uppercase;letter-spacing:.12em;margin-bottom:30px;}
  .form-group{margin-bottom:16px;text-align:left;}
  .form-group label{display:block;font-size:11px;font-weight:600;
    color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
  .form-group input{
    width:100%;background:var(--track);border:1px solid var(--card-ring);
    border-radius:14px;color:var(--text);font-family:var(--sans);
    font-size:16px;padding:13px 15px;outline:none;transition:border-color .2s;
  }
  .form-group input:focus{border-color:var(--accent);}
  .btn{
    width:100%;background:var(--accent);color:#fff;border:none;
    border-radius:14px;font-family:var(--sans);font-size:16px;
    font-weight:600;padding:14px;cursor:pointer;transition:opacity .15s;
    margin-top:4px;
  }
  .btn:active{opacity:.8;}
  .error{color:var(--red);font-size:13px;font-weight:500;
         margin-bottom:16px;padding:11px 14px;border:1px solid color-mix(in srgb,var(--red) 35%,transparent);
         border-radius:12px;background:color-mix(in srgb,var(--red) 12%,transparent);text-align:left;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🏠</div>
  <h1>HomeM</h1>
  <div class="sub">Monitor</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" name="username" autofocus placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Entrar</button>
  </form>
</div>
</body>
</html>
